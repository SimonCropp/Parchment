image: Visual Studio 2022
environment:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
build_script:
- pwsh: |
    # Install bundled fonts (direct copy avoids COM Shell hangs on CI).
    # Each font is validated via System.Drawing before install; corrupt files
    # (e.g. TTFs mangled by Git CRLF conversion) will fail the build here
    # rather than surfacing as confusing "font not found" errors at test time.
    $ErrorActionPreference = 'Stop'
    Add-Type -AssemblyName System.Drawing
    $fontsPath = "src/Fonts"
    $winFonts = "$env:WINDIR\Fonts"
    $regKey = "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Fonts"
    Write-Host "Font source: $fontsPath"
    $files = @(Get-ChildItem -Path $fontsPath -Recurse -File |
        Where-Object { $_.Extension -in '.ttf', '.otf' })
    Write-Host "Found $($files.Count) font files"
    if ($files.Count -eq 0)
    {
        throw "No font files found in $fontsPath"
    }
    foreach ($file in $files)
    {
        $pfc = New-Object System.Drawing.Text.PrivateFontCollection
        try
        {
            $pfc.AddFontFile($file.FullName)
            if ($pfc.Families.Count -eq 0 -or [string]::IsNullOrEmpty($pfc.Families[0].Name))
            {
                throw "Font file '$($file.FullName)' has no family name (likely corrupt — check .gitattributes marks *.ttf/*.otf as binary)"
            }
            $family = $pfc.Families[0].Name
        }
        finally
        {
            $pfc.Dispose()
        }
        Write-Host "Installing $($file.Name) (family: '$family')"
        Copy-Item $file.FullName -Destination $winFonts -Force
        $fontName = [System.IO.Path]::GetFileNameWithoutExtension($file.Name)
        $fontType = if ($file.Extension -eq ".otf") { "OpenType" } else { "TrueType" }
        New-ItemProperty -Path $regKey -Name "$fontName ($fontType)" -Value $file.Name -PropertyType String -Force | Out-Null
    }
- appveyor DownloadFile https://dot.net/v1/dotnet-install.ps1
- pwsh: ./dotnet-install.ps1 -JSonFile src/global.json -Architecture x64 -InstallDir 'C:\Program Files\dotnet'
- dotnet build src --configuration Release
# Diagnostic: prove which Parchment bits IntegrationTests actually consumes. Wipes any cached
# Parchment, restores fresh from the local feed (PackageSourceMapping in nuget.config pins it
# there), then dumps the extracted analyzer folder structure + the SHA256 of the SG dll vs
# the freshly-built one. If hashes match, the staleness theory is wrong and the SG itself
# isn't generating for nested types under SDK 10.0.203's Roslyn host. Diagnostic runs before
# the build so it fires even when the build fails.
- pwsh: |
    $cache = "$env:USERPROFILE\.nuget\packages\parchment"
    if (Test-Path $cache) { Write-Host "Removing stale cache at $cache"; Remove-Item -Recurse -Force $cache } else { Write-Host "No stale Parchment cache" }
    Write-Host "--- nugets/ contents:"
    Get-ChildItem nugets -Filter Parchment*.nupkg | ForEach-Object { Write-Host "  $($_.Name) - $($_.Length) bytes - $($_.LastWriteTime)" }
    Write-Host "--- Restoring IntegrationTests so we can inspect the extracted package:"
    dotnet restore IntegrationTests --verbosity minimal
    Write-Host "--- Extracted analyzer folder for parchment after restore:"
    $analyzers = Get-ChildItem "$env:USERPROFILE\.nuget\packages\parchment" -Recurse -Filter *.dll -ErrorAction SilentlyContinue
    foreach ($dll in $analyzers) {
      $hash = (Get-FileHash $dll.FullName -Algorithm SHA256).Hash.Substring(0,16)
      Write-Host "  [$hash] $($dll.FullName.Substring($cache.Length + 1))"
    }
    Write-Host "--- Freshly-built SG dll hashes (for comparison):"
    Get-ChildItem src/Parchment.SourceGenerator/bin/Release -Recurse -Filter Parchment.SourceGenerator.dll | ForEach-Object {
      $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.Substring(0,16)
      Write-Host "  [$hash] $($_.FullName)"
    }
- dotnet build IntegrationTests --configuration Release --no-restore
- dotnet run --project src/Parchment.Tests --configuration Release --no-build
- dotnet run --project src/Parchment.SourceGenerator.Tests --configuration Release --no-build
- dotnet run --project IntegrationTests/IntegrationTests --configuration Release --no-build
on_failure:
  - ps: |
      $root = (Get-Location).Path
      Get-ChildItem *.received.* -Recurse | % {
        $rel = $_.FullName.Substring($root.Length + 1)
        Push-AppveyorArtifact $_.FullName -FileName $rel
      }
test: off
artifacts:
- path: nugets\*.nupkg
